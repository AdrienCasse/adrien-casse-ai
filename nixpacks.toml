[phases.setup]
nixPkgs = ["python311", "python311Packages.pip"]

[phases.install]
cmds = ["cd backend && python3.11 -m pip install -r requirements.txt"]

[phases.build]
cmds = ["cd backend && python3.11 embed.py"]

[start]
cmd = "cd backend && python3.11 -m uvicorn main:app --host 0.0.0.0 --port $PORT"
